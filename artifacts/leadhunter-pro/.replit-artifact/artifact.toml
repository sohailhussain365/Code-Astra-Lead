kind = "web"
previewPath = "/"
title = "LeadHunter Pro"
version = "1.0.0"
id = "artifacts/leadhunter-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22067

[services.development]
run = "pnpm --filter @workspace/leadhunter-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leadhunter-pro", "run", "build" ]
publicDir = "artifacts/leadhunter-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22067"
BASE_PATH = "/"
